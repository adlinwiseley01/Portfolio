<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  
  <!-- Decorative Glowing Circles -->
  <circle cx="1100" cy="100" r="200" fill="#3b82f6" opacity="0.08" filter="url(#glow)"/>
  <circle cx="100" cy="530" r="250" fill="#8b5cf6" opacity="0.08" filter="url(#glow)"/>
  
  <!-- Monogram Box -->
  <rect x="525" y="140" width="150" height="150" rx="32" fill="#1e293b" stroke="url(#accent-grad)" stroke-width="4" opacity="0.8"/>
  <text x="600" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="86" fill="white" style="letter-spacing: -2px;">AW</text>
  
  <!-- Name -->
  <text x="600" y="380" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="76" fill="white">Adlin Wiseley</text>
  
  <!-- Title -->
  <text x="600" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="34" fill="url(#accent-grad)" style="text-transform: uppercase; letter-spacing: 5px;">Junior Software Developer</text>
  
  <!-- Divider -->
  <rect x="450" y="490" width="300" height="1" fill="url(#accent-grad)" opacity="0.4"/>
  
  <!-- Tagline -->
  <text x="600" y="535" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="26" fill="#94a3b8">React &amp; Angular • UI Specialist • API Engineer</text>
</svg>
