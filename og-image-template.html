<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            overflow: hidden;
            background-color: #0c0c0c;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, rgba(29, 78, 216, 0.15), transparent),
                radial-gradient(circle at bottom left, rgba(147, 51, 234, 0.15), transparent);
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            color: #94a3b8;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .title {
            font-size: 96px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff 0%, #a5f3fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 32px;
            font-weight: 400;
            margin-top: 16px;
            color: #94a3b8;
        }

        .decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 100px 100px;
            z-index: -1;
        }

        .social-handle {
            position: absolute;
            bottom: 40px;
            font-size: 20px;
            color: #475569;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="decoration"></div>
        <div class="badge">Portfolio</div>
        <h1 class="title">Adlin Wiseley</h1>
        <p class="subtitle">Junior Software Developer & UI Specialist</p>
        <div class="social-handle">adlinwiseley.online</div>
    </div>
</body>

</html>
